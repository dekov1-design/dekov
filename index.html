<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DEKOV | STUDIO PRO</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        
        :root {
            --bg: #000; --text: #fff; --accent: #fff;
            --glass: rgba(255, 255, 255, 0.05); --border: rgba(255, 255, 255, 0.1);
            --card: rgba(15, 15, 15, 0.9);
        }

        /* TEMAS */
        .tema-blanco { --bg: #f5f5f7; --text: #000; --accent: #007aff; --glass: rgba(0,0,0,0.05); --border: rgba(0,0,0,0.1); --card: rgba(255,255,255,0.9); }
        .tema-azul { --bg: #001a33; --accent: #007aff; }
        .tema-rojo { --bg: #1a0000; --accent: #ff3b30; }
        .tema-rosa { --bg: #1a000d; --accent: #ff2d55; }
        .tema-purpura { --bg: #0f051a; --accent: #af52de; }
        .tema-verde { --bg: #051405; --accent: #34c759; }

        body { 
            background: var(--bg); background-size: cover; background-position: center; background-attachment: fixed;
            color: var(--text); font-family: -apple-system, sans-serif; transition: 0.5s; overflow-x: hidden;
        }

        .header { position: fixed; top: 0; width: 100%; height: 60px; z-index: 5000; display: flex; align-items: center; justify-content: space-between; padding: 0 20px; backdrop-filter: blur(20px); }
        .btn-icon { width: 40px; height: 40px; border-radius: 50%; border: 1px solid var(--border); background: var(--glass); color: var(--text); cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 20px; }

        #sidebar { position: fixed; top: 0; left: -300px; width: 280px; height: 100%; background: var(--card); backdrop-filter: blur(40px); z-index: 6000; transition: 0.4s; padding: 80px 20px; border-right: 1px solid var(--border); }
        #sidebar.active { left: 0; }
        .nav-btn { width: 100%; padding: 15px; margin-bottom: 10px; border: none; border-radius: 12px; background: var(--glass); color: var(--text); font-weight: 700; text-align: left; cursor: pointer; font-size: 11px; text-transform: uppercase; letter-spacing: 1px; }

        #app-content { display: none; padding-top: 20px; opacity: 0; transition: 0.8s; }
        
        /* PERFIL & HERO */
        .hero { height: 380px; background: #111; overflow: hidden; position: relative; }
        .hero img { width: 100%; height: 100%; object-fit: cover; }
        .profile-wrap { text-align: center; margin-top: -85px; position: relative; z-index: 10; padding: 0 20px; }
        .avatar { width: 155px; height: 155px; border-radius: 50%; border: 6px solid var(--bg); display: inline-block; background: #222; overflow: hidden; box-shadow: 0 20px 40px rgba(0,0,0,0.8); }
        .avatar img { width: 100%; height: 100%; object-fit: cover; }
        .user-name-main { font-size: 42px; font-weight: 900; letter-spacing: -2px; margin-top: 15px; text-transform: uppercase; }

        /* PLAYER */
        .player { background: var(--glass); backdrop-filter: blur(10px); border-radius: 20px; padding: 15px; width: 100%; max-width: 330px; margin: 30px auto; border: 1px solid var(--border); }
        .player-top { display: flex; align-items: center; gap: 15px; }
        .p-info { text-align: left; flex-grow: 1; }
        .p-name { color: var(--text); font-size: 13px; font-weight: 800; display: block; text-transform: uppercase; }
        .p-sub { font-size: 9px; opacity: 0.4; text-transform: uppercase; }
        .play-btn { background: var(--text); border: none; width: 38px; height: 38px; border-radius: 50%; color: var(--bg); font-weight: 900; font-size: 10px; cursor: pointer; }

        /* GRID & FEED */
        .section-label { padding: 40px 20px 10px; font-size: 10px; letter-spacing: 3px; opacity: 0.3; font-weight: 900; text-transform: uppercase; text-align: center; }
        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; padding: 15px; }
        .card { background: var(--glass); border-radius: 15px; overflow: hidden; border: 1px solid var(--border); }
        .card img { width: 100%; display: block; }

        /* LOGIN */
        #login-screen { position: fixed; inset: 0; background: #000; z-index: 10000; display: flex; flex-direction: column; align-items: center; justify-content: center; }
    </style>
</head>
<body id="main-body">

    <audio id="audio-player"></audio>

    <div id="login-screen">
        <h1 style="font-size: 80px; font-weight: 900; letter-spacing: -6px; color: #fff; margin-bottom: 20px;">DEKOV</h1>
        <button onclick="login()" style="background:#fff; border:none; padding:18px 50px; border-radius:40px; font-weight:900; cursor:pointer; text-transform:uppercase; letter-spacing:1px;">Login with Google</button>
    </div>

    <div id="app-content">
        <div class="header">
            <button class="btn-icon" onclick="toggleSidebar()">☰</button>
            <button class="btn-icon" onclick="copyApp()">🔗</button>
        </div>

        <nav id="sidebar">
            <button class="nav-btn" onclick="view('perfil')">My Studio</button>
            <button class="nav-btn" onclick="view('feed')">Discover Feed</button>
            <button class="nav-btn" onclick="toggleModal()">Settings</button>
            <button class="nav-btn" style="background:var(--accent); color:var(--bg);" onclick="document.getElementById('up-img').click()">Add Photo</button>
            <input type="file" id="up-img" hidden onchange="upload(event)">
            <button class="nav-btn" style="margin-top:auto; opacity:0.2;" onclick="logout()">Sign Out</button>
        </nav>

        <div id="v-perfil">
            <div class="hero"><img src="https://picsum.photos/seed/dkv1/1200/600" id="v-banner"></div>
            <div class="profile-wrap">
                <div class="avatar" id="v-avatar-box"></div>
                <h1 id="v-name" class="user-name-main">...</h1>
                
                <div class="player">
                    <div class="player-top">
                        <div class="p-info">
                            <span class="p-name" id="m-t">Silent Mode</span>
                            <span class="p-sub" id="m-a">No track loaded</span>
                        </div>
                        <button class="play-btn" id="play-pause" onclick="togglePlay()">PLAY</button>
                    </div>
                </div>
            </div>
            <p class="section-label">Gallery Collection</p>
            <div class="grid" id="my-grid"></div>
        </div>

        <div id="v-feed" style="display:none;">
            <div style="padding: 15px 20px; position: sticky; top: 60px; z-index: 4000; background: var(--bg);">
                <input type="text" id="feed-search" placeholder="Search Studio..." style="width:100%; padding:12px; border-radius:12px; border:1px solid var(--border); background:var(--glass); color:#fff; text-transform:uppercase; font-size:11px;" onkeydown="if(event.key==='Enter') genFeed()">
            </div>
            <p class="section-label">Global Discovery</p>
            <div class="grid" id="global-grid"></div>
        </div>

        <div id="modal" style="position:fixed; inset:0; background:rgba(0,0,0,0.9); backdrop-filter:blur(30px); z-index:7000; display:none; align-items:center; justify-content:center;">
            <div style="background:#111; width:90%; max-width:400px; padding:30px; border-radius:30px; border:1px solid var(--border);">
                <input type="text" id="in-name" placeholder="Custom Name" style="width:100%; padding:12px; margin-bottom:15px; border-radius:10px; border:1px solid var(--border); background:#000; color:#fff;">
                <input type="text" id="in-gif" placeholder="Wallpaper URL (GIF)" style="width:100%; padding:12px; margin-bottom:15px; border-radius:10px; border:1px solid var(--border); background:#000; color:#fff;">
                <button class="nav-btn" onclick="document.getElementById('f-mus').click()">Change Music (MP3)</button>
                <input type="file" id="f-mus" hidden accept="audio/*" onchange="setMusic(event)">
                <button class="nav-btn" onclick="applySettings()" style="background:var(--accent); color:var(--bg); margin-top:15px;">Apply</button>
                <button class="nav-btn" onclick="toggleModal()" style="opacity:0.5;">Cancel</button>
            </div>
        </div>
    </div>

    <script>
        // CONFIG DE TU FIREBASE
        const firebaseConfig = {
            apiKey: "AIzaSyCxRzw9Br2t4TGDfKsdTzAuVPyoi2ey-0o",
            authDomain: "dekov-c0c5b.firebaseapp.com",
            projectId: "dekov-c0c5b",
            storageBucket: "dekov-c0c5b.appspot.com",
            messagingSenderId: "654392697937",
            appId: "1:654392697937:web:8b3b71eb94410709bc0470"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const audio = document.getElementById('audio-player');

        function login() { auth.signInWithPopup(new firebase.auth.GoogleAuthProvider()); }
        function logout() { auth.signOut().then(() => location.reload()); }

        auth.onAuthStateChanged(user => {
            if (user) {
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('app-content').style.display = 'block';
                setTimeout(() => document.getElementById('app-content').style.opacity = '1', 50);
                
                // Cargar datos de Google
                document.getElementById('v-name').innerText = user.displayName.toUpperCase();
                document.getElementById('v-avatar-box').innerHTML = `<img src="${user.photoURL}">`;
                genFeed();
            }
        });

        function togglePlay() {
            if (audio.paused) { audio.play(); document.getElementById('play-pause').innerText = 'PAUSE'; } 
            else { audio.pause(); document.getElementById('play-pause').innerText = 'PLAY'; }
        }

        function setMusic(e) {
            const f = e.target.files[0];
            if(f) {
                audio.src = URL.createObjectURL(f);
                document.getElementById('m-t').innerText = f.name.toUpperCase();
                document.getElementById('play-pause').style.display = 'block';
            }
        }

        function genFeed() {
            const g = document.getElementById('global-grid');
            const t = document.getElementById('feed-search').value || 'art';
            g.innerHTML = '';
            for(let i=0; i<10; i++) {
                g.innerHTML += `<div class="card"><img src="https://picsum.photos/seed/${t+i}/800/1000"></div>`;
            }
        }

        function applySettings() {
            const n = document.getElementById('in-name').value;
            const g = document.getElementById('in-gif').value;
            if(n) document.getElementById('v-name').innerText = n.toUpperCase();
            if(g) document.body.style.backgroundImage = `url('${g}')`;
            toggleModal();
        }

        function view(v) {
            document.getElementById('v-perfil').style.display = v === 'perfil' ? 'block' : 'none';
            document.getElementById('v-feed').style.display = v === 'feed' ? 'block' : 'none';
            toggleSidebar();
        }

        function upload(e) {
            const url = URL.createObjectURL(e.target.files[0]);
            document.getElementById('my-grid').innerHTML = `<div class="card"><img src="${url}"></div>` + document.getElementById('my-grid').innerHTML;
        }

        function toggleSidebar() { document.getElementById('sidebar').classList.toggle('active'); }
        function toggleModal() { 
            const m = document.getElementById('modal');
            m.style.display = (m.style.display === 'flex') ? 'none' : 'flex'; 
        }
        function copyApp() { navigator.clipboard.writeText(window.location.href); alert("LINK COPIED"); }
    </script>
</body>
</html>
