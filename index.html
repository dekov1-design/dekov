<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DEKOV | STUDIO PRO</title>
    
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        :root {
            --bg: #000; --text: #fff; --accent: #007aff;
            --glass: rgba(255, 255, 255, 0.1); --border: rgba(255, 255, 255, 0.15);
            --card-bg: rgba(28, 28, 30, 0.8);
        }
        .tema-purpura { --bg: #0f051a; --accent: #af52de; }
        .tema-verde { --bg: #05140b; --accent: #34c759; }
        .tema-rojo { --bg: #1a0505; --accent: #ff3b30; }

        body { background-color: var(--bg); color: var(--text); font-family: -apple-system, sans-serif; transition: 0.5s; }

        /* LOGIN */
        #login-screen { position: fixed; inset: 0; background: #000; z-index: 50000; display: flex; align-items: center; justify-content: center; text-align: center; }
        .login-card { background: var(--card-bg); padding: 50px 30px; border-radius: 40px; border: 1px solid var(--border); backdrop-filter: blur(20px); width: 90%; max-width: 360px; }
        .google-btn { width: 100%; height: 50px; background: #fff; border: none; border-radius: 25px; display: flex; align-items: center; justify-content: center; gap: 12px; cursor: pointer; margin-top: 25px; font-weight: 600; color: #1f1f1f; }

        /* SIDEBAR */
        #sidebar { position: fixed; top: 15px; left: -280px; width: 260px; height: calc(100% - 30px); background: var(--card-bg); backdrop-filter: blur(30px); border-radius: 30px; border: 1px solid var(--border); transition: 0.5s; z-index: 10000; padding: 40px 20px; display: flex; flex-direction: column; }
        #sidebar.activo { left: 15px; }
        .btn-menu { position: fixed; top: 25px; left: 25px; z-index: 10001; width: 45px; height: 45px; border-radius: 50%; border: 1px solid var(--border); background: var(--card-bg); color: #fff; cursor: pointer; display: flex; align-items: center; justify-content: center; }

        /* BOTONES */
        .btn-nav { width: 100%; padding: 14px; margin-bottom: 8px; border: none; border-radius: 15px; background: var(--glass); color: #fff; font-weight: 600; cursor: pointer; text-align: left; }
        
        /* MODAL DE AJUSTES */
        #modal { position: fixed; inset: 0; background: rgba(0,0,0,0.9); backdrop-filter: blur(10px); display: none; align-items: center; justify-content: center; z-index: 20000; }
        .modal-inner { background: var(--card-bg); padding: 30px; border-radius: 30px; width: 90%; max-width: 380px; border: 1px solid var(--border); text-align: center; }

        /* PERFIL */
        #banner { height: 300px; background: #1a1a1a; overflow: hidden; position: relative; border-bottom: 1px solid var(--border); }
        #banner img { width: 100%; height: 100%; object-fit: cover; }
        .perfil-header { text-align: center; margin-top: -75px; position: relative; z-index: 10; }
        .avatar { width: 140px; height: 140px; border-radius: 50%; border: 5px solid var(--bg); overflow: hidden; display: inline-block; background: #222; }
        .avatar img { width: 100%; height: 100%; object-fit: cover; }

        /* SPOTIFY */
        #spotify-widget { background: #121212; border-radius: 15px; padding: 10px 15px; width: 260px; margin: 15px auto; display: flex; align-items: center; gap: 12px; border: 1px solid #1DB954; }

        /* MURO */
        .grid-muro { columns: 2 150px; column-gap: 15px; padding: 15px; }
        .muro-item { break-inside: avoid; margin-bottom: 15px; border-radius: 15px; overflow: hidden; border: 1px solid var(--border); }
        .muro-item img { width: 100%; display: block; }
    </style>
</head>
<body id="main">

    <div id="login-screen">
        <div class="login-card">
            <h1 style="font-size: 40px; font-weight: 900; letter-spacing: -2px;">DEKOV</h1>
            <button class="google-btn" onclick="loginReal()">Entrar con Google</button>
        </div>
    </div>

    <div id="app-content" style="display:none;">
        <button class="btn-menu" onclick="toggleSidebar()">☰</button>

        <div id="sidebar">
            <p id="saludo" style="opacity: 0.5; margin-bottom: 20px;">HOLA</p>
            <button class="btn-nav" onclick="irInicio()">Explorar</button>
            <button class="btn-nav" onclick="irPerfil()">Mi Perfil</button>
            <button class="btn-nav" onclick="toggleModal()">Configuración</button>
            <button class="btn-nav" style="background:var(--accent); margin-top:10px;" onclick="document.getElementById('up-muro').click()">+ Subir al Muro</button>
            <input type="file" id="up-muro" hidden onchange="subirFoto(event, 'grid')">
            
            <div style="margin-top:20px; display:flex; gap:8px; justify-content:center;">
                <div class="dot" style="background:#111" onclick="cambiarTema('')"></div>
                <div class="dot" style="background:#af52de" onclick="cambiarTema('purpura')"></div>
                <div class="dot" style="background:#34c759" onclick="cambiarTema('verde')"></div>
                <div class="dot" style="background:#ff3b30" onclick="cambiarTema('rojo')"></div>
            </div>
            <button class="btn-nav" style="margin-top:auto; opacity:0.3;" onclick="location.reload()">Salir</button>
        </div>

        <div id="modal">
            <div class="modal-inner">
                <h3 style="margin-bottom:20px;">Personalizar</h3>
                <button class="btn-nav" onclick="document.getElementById('in-p').click()">Cambiar Foto Perfil</button>
                <input type="file" id="in-p" hidden onchange="previewMedia(event, 'user-avatar')">
                
                <button class="btn-nav" onclick="document.getElementById('in-b').click()">Cambiar Portada</button>
                <input type="file" id="in-b" hidden onchange="previewMedia(event, 'banner')">

                <button class="btn-nav" style="background:#1DB954;" onclick="alert('Pega el link de tu playlist pronto...')">Vincular Spotify</button>
                <button class="btn-nav" style="background:var(--accent); margin-top:20px;" onclick="toggleModal()">Listo</button>
            </div>
        </div>

        <div id="banner"><img src="https://picsum.photos/1200/600" id="img-b"></div>

        <div class="perfil-header" id="ui-header">
            <div class="avatar" id="user-avatar"></div>
            <h1 id="user-name" style="margin-top:15px; font-weight:900;">USUARIO</h1>
            
            <div id="spotify-widget">
                <img src="https://upload.wikimedia.org/wikipedia/commons/1/19/Spotify_logo_without_text.svg" width="20">
                <div style="text-align: left;">
                    <p style="color:#1DB954; font-size:12px; font-weight:bold;">Starboy</p>
                    <p style="font-size:10px; opacity:0.6;">The Weeknd</p>
                </div>
            </div>
        </div>

        <div class="grid-muro" id="grid">
            <div class="muro-item"><img src="https://picsum.photos/seed/1/500/700"></div>
            <div class="muro-item"><img src="https://picsum.photos/seed/2/500/600"></div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCxRzw9Br2t4TGDfKsdTzAuVPyoi2ey-0o",
            authDomain: "dekov-c0c5b.firebaseapp.com",
            projectId: "dekov-c0c5b",
            storageBucket: "dekov-c0c5b.firebasestorage.app",
            messagingSenderId: "654392697937",
            appId: "1:654392697937:web:8b3b71eb94410709bc0470"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        function loginReal() {
            const provider = new firebase.auth.GoogleAuthProvider();
            auth.signInWithPopup(provider).then(res => entrar(res.user)).catch(e => alert(e.message));
        }

        function entrar(user) {
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('app-content').style.display = 'block';
            document.getElementById('user-name').innerText = user.displayName.toUpperCase();
            document.getElementById('saludo').innerText = "HOLA, " + user.displayName.split(' ')[0].toUpperCase();
            document.getElementById('user-avatar').innerHTML = `<img src="${user.photoURL}">`;
        }

        function toggleSidebar() { document.getElementById('sidebar').classList.toggle('activo'); }
        function toggleModal() { 
            const m = document.getElementById('modal');
            m.style.display = (m.style.display === 'flex') ? 'none' : 'flex'; 
        }

        function previewMedia(e, id) {
            const url = URL.createObjectURL(e.target.files[0]);
            document.getElementById(id).innerHTML = `<img src="${url}">`;
        }

        function subirFoto(e, id) {
            const url = URL.createObjectURL(e.target.files[0]);
            const html = `<div class="muro-item"><img src="${url}"></div>`;
            document.getElementById(id).innerHTML = html + document.getElementById(id).innerHTML;
            toggleSidebar();
        }

        function cambiarTema(t) {
            document.getElementById('main').className = t ? 'tema-'+t : '';
            if(auth.currentUser) db.collection("usuarios").doc(auth.currentUser.uid).set({tema:t}, {merge:true});
        }

        function irInicio() {
            document.getElementById('ui-header').style.display = 'none';
            document.getElementById('banner').style.height = '80px';
            toggleSidebar();
        }

        function irPerfil() {
            document.getElementById('ui-header').style.display = 'block';
            document.getElementById('banner').style.height = '300px';
            toggleSidebar();
        }

        auth.onAuthStateChanged(user => { if(user) entrar(user); });
    </script>
</body>
</html>
