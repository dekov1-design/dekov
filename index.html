<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DEKOV | STUDIO PRO</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-storage-compat.js"></script>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        
        :root {
            --bg: #000; --text: #fff; --accent: #fff;
            --glass: rgba(255, 255, 255, 0.05); --border: rgba(255, 255, 255, 0.1);
            --card: rgba(15, 15, 15, 0.9);
        }

        /* TEMAS RECUPERADOS */
        .tema-blanco { --bg: #f5f5f7; --text: #000; --accent: #007aff; --glass: rgba(0,0,0,0.05); --border: rgba(0,0,0,0.1); --card: rgba(255,255,255,0.9); }
        .tema-azul { --bg: #001a33; --accent: #007aff; }
        .tema-rojo { --bg: #1a0000; --accent: #ff3b30; }
        .tema-rosa { --bg: #1a000d; --accent: #ff2d55; }
        .tema-purpura { --bg: #0f051a; --accent: #af52de; }
        .tema-verde { --bg: #051405; --accent: #34c759; }
        .tema-gris { --bg: #1c1c1e; --accent: #8e8e93; }

        body { 
            background: var(--bg); background-size: cover; background-position: center; background-attachment: fixed;
            color: var(--text); font-family: -apple-system, sans-serif; transition: 0.5s; overflow-x: hidden;
        }

        .header { position: fixed; top: 0; width: 100%; height: 60px; z-index: 5000; display: flex; align-items: center; justify-content: space-between; padding: 0 20px; backdrop-filter: blur(20px); border-bottom: 1px solid var(--border); }
        .btn-icon { width: 40px; height: 40px; border-radius: 50%; border: 1px solid var(--border); background: var(--glass); color: var(--text); cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 18px; font-weight: 300; }

        #sidebar { position: fixed; top: 0; left: -300px; width: 280px; height: 100%; background: var(--card); backdrop-filter: blur(40px); z-index: 6000; transition: 0.4s; padding: 80px 20px; border-right: 1px solid var(--border); }
        #sidebar.active { left: 0; }
        .nav-btn { width: 100%; padding: 15px; margin-bottom: 10px; border: none; border-radius: 12px; background: var(--glass); color: var(--text); font-weight: 700; text-align: left; cursor: pointer; font-size: 11px; text-transform: uppercase; letter-spacing: 1px; }

        /* VOLVEMOS AL FEED ORIGINAL */
        .hero { height: 380px; background: #111; overflow: hidden; position: relative; }
        .hero img { width: 100%; height: 100%; object-fit: cover; }
        
        .profile-wrap { text-align: center; margin-top: -85px; position: relative; z-index: 10; padding: 0 20px; }
        .avatar { width: 155px; height: 155px; border-radius: 50%; border: 6px solid var(--bg); display: inline-block; background: #222; overflow: hidden; box-shadow: 0 20px 40px rgba(0,0,0,0.8); }
        .avatar img { width: 100%; height: 100%; object-fit: cover; }
        .user-name-main { font-size: 42px; font-weight: 900; letter-spacing: -2px; margin-top: 15px; text-transform: uppercase; }

        .search-container { padding: 15px 20px; position: sticky; top: 60px; z-index: 4000; background: var(--bg); }
        .search-bar { width: 100%; padding: 12px 20px; border-radius: 12px; border: 1px solid var(--border); background: var(--glass); color: var(--text); font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; }

        .section-label { padding: 40px 20px 10px; font-size: 10px; letter-spacing: 3px; opacity: 0.3; font-weight: 900; text-transform: uppercase; text-align: center; }
        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; padding: 15px; }
        .card { background: var(--glass); border-radius: 15px; overflow: hidden; position: relative; border: 1px solid var(--border); }
        .card img { width: 100%; display: block; object-fit: cover; aspect-ratio: 1/1.3; }
        
        .card-overlay { position: absolute; inset: 0; background: linear-gradient(transparent, rgba(0,0,0,0.8)); display: flex; align-items: flex-end; justify-content: space-around; padding: 15px; opacity: 0; transition: 0.3s; }
        .card:hover .card-overlay { opacity: 1; }
        .btn-action { background: rgba(255,255,255,0.2); border: 1px solid rgba(255,255,255,0.3); color: #fff; padding: 8px 12px; border-radius: 8px; font-size: 9px; font-weight: 800; cursor: pointer; text-transform: uppercase; }

        /* MODAL SETTINGS */
        #modal { position: fixed; inset: 0; background: rgba(0,0,0,0.9); backdrop-filter: blur(30px); z-index: 7000; display: none; align-items: center; justify-content: center; overflow-y: auto; }
        .modal-inner { background: #111; width: 90%; max-width: 420px; border-radius: 35px; padding: 35px; border: 1px solid var(--border); }
        .input-item { width: 100%; padding: 15px; border-radius: 12px; border: 1px solid var(--border); background: #000; color: #fff; margin-bottom: 15px; font-size: 11px; font-weight: 700; text-transform: uppercase; }
        
        .dots { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; margin: 25px 0; justify-items: center; }
        .dot { width: 35px; height: 35px; border-radius: 50%; cursor: pointer; border: 2px solid rgba(255,255,255,0.2); }

        #login-screen { position: fixed; inset: 0; background: #000; z-index: 10000; display: flex; flex-direction: column; align-items: center; justify-content: center; }
    </style>
</head>
<body id="main-body">

    <div id="login-screen">
        <h1 style="font-size: 80px; font-weight: 900; letter-spacing: -6px; color: #fff; margin-bottom: 30px;">DEKOV</h1>
        <button onclick="login()" style="background: #fff; color: #000; border: none; padding: 18px 50px; border-radius: 40px; font-weight: 900; cursor: pointer; text-transform: uppercase; letter-spacing: 2px;">Enter Studio</button>
    </div>

    <div id="app-content" style="display:none;">
        <div class="header">
            <button class="btn-icon" onclick="toggleSidebar()">M</button>
            <div style="font-weight: 900; font-size: 11px; letter-spacing: 3px; opacity: 0.5;">STUDIO PRO</div>
            <button class="btn-icon" onclick="toggleModal()">S</button>
        </div>

        <nav id="sidebar">
            <button class="nav-btn" onclick="view('perfil')">My Studio</button>
            <button class="nav-btn" onclick="view('feed')">Discovery</button>
            <button class="nav-btn" style="background:var(--accent); color:var(--bg); margin-top:20px;" onclick="document.getElementById('f-up').click()">Add Content</button>
            <input type="file" id="f-up" hidden onchange="uploadPhoto(event)">
            <button class="nav-btn" style="margin-top:auto; opacity:0.3;" onclick="location.reload()">Exit</button>
        </nav>

        <div id="v-perfil">
            <div class="hero"><img src="https://picsum.photos/seed/dkv1/1200/600" id="v-banner"></div>
            <div class="profile-wrap">
                <div class="avatar" id="v-avatar-box"></div>
                <h1 id="v-name" class="user-name-main">...</h1>
            </div>
            <p class="section-label">My Collection</p>
            <div class="grid" id="my-grid"></div>
        </div>

        <div id="v-feed" style="display:none;">
            <div class="search-container">
                <input type="text" class="search-bar" id="feed-search" placeholder="Search gallery..." onkeydown="if(event.key==='Enter') loadFeed()">
            </div>
            <p class="section-label">Global Feed</p>
            <div class="grid" id="global-grid"></div>
        </div>

        <div id="modal">
            <div class="modal-inner">
                <input type="text" id="in-name" class="input-item" placeholder="Studio Name">
                <input type="text" id="in-gif" class="input-item" placeholder="GIF Wallpaper Link">
                <div class="dots">
                    <div class="dot" style="background:#000" onclick="setT('')"></div>
                    <div class="dot" style="background:#fff" onclick="setT('blanco')"></div>
                    <div class="dot" style="background:#007aff" onclick="setT('azul')"></div>
                    <div class="dot" style="background:#ff3b30" onclick="setT('rojo')"></div>
                    <div class="dot" style="background:#ff2d55" onclick="setT('rosa')"></div>
                    <div class="dot" style="background:#af52de" onclick="setT('purpura')"></div>
                    <div class="dot" style="background:#051405" onclick="setT('verde')"></div>
                    <div class="dot" style="background:#444" onclick="setT('gris')"></div>
                </div>
                <button class="nav-btn" onclick="saveSettings()">Apply Changes</button>
                <button class="nav-btn" onclick="toggleModal()" style="opacity:0.5;">Close</button>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCxRzw9Br2t4TGDfKsdTzAuVPyoi2ey-0o",
            authDomain: "dekov-c0c5b.firebaseapp.com",
            projectId: "dekov-c0c5b",
            storageBucket: "dekov-c0c5b.appspot.com",
            messagingSenderId: "654392697937",
            appId: "1:654392697937:web:8b3b71eb94410709bc0470"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();
        const storage = firebase.storage();
        let user = null;

        function login() { auth.signInWithPopup(new firebase.auth.GoogleAuthProvider()).then(res => { user = res.user; init(); }); }

        function init() {
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('app-content').style.display = 'block';
            document.getElementById('v-name').innerText = (localStorage.getItem('st_name') || user.displayName).toUpperCase();
            document.getElementById('v-avatar-box').innerHTML = `<img src="${user.photoURL}">`;
            if(localStorage.getItem('st_gif')) setGif(localStorage.getItem('st_gif'));
            if(localStorage.getItem('st_theme')) setT(localStorage.getItem('st_theme'));
            loadFeed();
            loadMyPosts();
        }

        async function uploadPhoto(e) {
            const file = e.target.files[0]; if(!file) return;
            const ref = storage.ref(`posts/${Date.now()}_${user.uid}`);
            await ref.put(file);
            const url = await ref.getDownloadURL();
            await db.collection('posts').add({ url, uid: user.uid, name: user.displayName, likes: 0, time: Date.now() });
            loadFeed(); loadMyPosts();
        }

        function loadFeed() {
            const term = document.getElementById('feed-search').value.toLowerCase();
            db.collection('posts').orderBy('time', 'desc').onSnapshot(snap => {
                const g = document.getElementById('global-grid'); g.innerHTML = '';
                snap.forEach(doc => {
                    const p = doc.data();
                    g.innerHTML += `<div class="card"><img src="${p.url}"><div class="card-overlay"><button class="btn-action" onclick="like('${doc.id}')">LIKE ${p.likes||0}</button></div></div>`;
                });
            });
        }

        function loadMyPosts() {
            db.collection('posts').where('uid', '==', user.uid).onSnapshot(snap => {
                const g = document.getElementById('my-grid'); g.innerHTML = '';
                snap.forEach(doc => { g.innerHTML += `<div class="card"><img src="${doc.data().url}"></div>`; });
            });
        }

        async function like(id) { const r = db.collection('posts').doc(id); await r.update({ likes: firebase.firestore.FieldValue.increment(1) }); }
        
        function saveSettings() {
            const n = document.getElementById('in-name').value;
            const g = document.getElementById('in-gif').value;
            if(n) { document.getElementById('v-name').innerText = n.toUpperCase(); localStorage.setItem('st_name', n); }
            if(g) { setGif(g); localStorage.setItem('st_gif', g); }
            toggleModal();
        }

        function setGif(u) { document.body.style.backgroundImage = `url('${u}')`; }
        function setT(t) { document.getElementById('main-body').className = t ? 'tema-'+t : ''; localStorage.setItem('st_theme', t); }
        function view(v) { document.getElementById('v-perfil').style.display = v === 'perfil' ? 'block' : 'none'; document.getElementById('v-feed').style.display = v === 'feed' ? 'block' : 'none'; toggleSidebar(); }
        function toggleSidebar() { document.getElementById('sidebar').classList.toggle('active'); }
        function toggleModal() { const m = document.getElementById('modal'); m.style.display = (m.style.display === 'flex') ? 'none' : 'flex'; }
        auth.onAuthStateChanged(u => { if(u) { user = u; init(); } });
    </script>
</body>
</html>
