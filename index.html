<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DEKOV | STUDIO PRO</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        
        :root {
            --bg: #000; --text: #fff; --accent: #fff;
            --glass: rgba(255, 255, 255, 0.05); --border: rgba(255, 255, 255, 0.1);
            --card: rgba(15, 15, 15, 0.9);
        }

        .tema-blanco { --bg: #f5f5f7; --text: #000; --accent: #007aff; --glass: rgba(0,0,0,0.05); --border: rgba(0,0,0,0.1); --card: rgba(255,255,255,0.9); }
        .tema-azul { --bg: #001a33; --accent: #007aff; }
        .tema-rojo { --bg: #1a0000; --accent: #ff3b30; }
        .tema-rosa { --bg: #1a000d; --accent: #ff2d55; }
        .tema-purpura { --bg: #0f051a; --accent: #af52de; }
        .tema-verde { --bg: #051405; --accent: #34c759; }
        .tema-gris { --bg: #1c1c1e; --accent: #8e8e93; }

        body { 
            background: var(--bg); background-size: cover; background-position: center; background-attachment: fixed;
            color: var(--text); font-family: -apple-system, sans-serif; transition: 0.5s; overflow-x: hidden;
        }

        .header { position: fixed; top: 0; width: 100%; height: 60px; z-index: 5000; display: flex; align-items: center; justify-content: space-between; padding: 0 20px; backdrop-filter: blur(20px); }
        .btn-icon { width: 40px; height: 40px; border-radius: 50%; border: 1px solid var(--border); background: var(--glass); color: var(--text); cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 20px; }

        .search-container { padding: 15px 20px; position: sticky; top: 60px; z-index: 4000; background: var(--bg); }
        .search-bar { width: 100%; padding: 12px 20px; border-radius: 12px; border: 1px solid var(--border); background: var(--glass); color: var(--text); font-size: 13px; font-weight: 600; text-transform: uppercase; }

        #sidebar { position: fixed; top: 0; left: -300px; width: 280px; height: 100%; background: var(--card); backdrop-filter: blur(40px); z-index: 6000; transition: 0.4s; padding: 80px 20px; border-right: 1px solid var(--border); }
        #sidebar.active { left: 0; }
        .nav-btn { width: 100%; padding: 15px; margin-bottom: 10px; border: none; border-radius: 12px; background: var(--glass); color: var(--text); font-weight: 700; text-align: left; cursor: pointer; font-size: 11px; text-transform: uppercase; }

        #app-content { display: none; padding-top: 20px; opacity: 0; transition: 0.8s; }
        .hero { height: 380px; background: #111; overflow: hidden; position: relative; }
        .hero img { width: 100%; height: 100%; object-fit: cover; }
        
        .profile-wrap { text-align: center; margin-top: -85px; position: relative; z-index: 10; padding: 0 20px; }
        .avatar { width: 155px; height: 155px; border-radius: 50%; border: 6px solid var(--bg); display: inline-block; background: #222; overflow: hidden; box-shadow: 0 20px 40px rgba(0,0,0,0.8); }
        .avatar img { width: 100%; height: 100%; object-fit: cover; }
        .user-name-main { font-size: 42px; font-weight: 900; letter-spacing: -2px; margin-top: 15px; text-transform: uppercase; }

        .player { background: var(--glass); backdrop-filter: blur(10px); border-radius: 20px; padding: 15px; width: 100%; max-width: 330px; margin: 30px auto; display: flex; flex-direction: column; gap: 12px; border: 1px solid var(--border); }
        .player-top { display: flex; align-items: center; gap: 15px; }
        #music-cover-img { width: 50px; height: 50px; border-radius: 8px; object-fit: cover; display: none; }
        #spotify-logo { width: 22px; display: none; }
        .p-info { text-align: left; flex-grow: 1; overflow: hidden; }
        .p-name { color: var(--text); font-size: 13px; font-weight: 800; display: block; text-transform: uppercase; }
        .p-sub { font-size: 9px; opacity: 0.4; text-transform: uppercase; color: var(--text); }
        .play-btn { background: var(--text); border: none; width: 38px; height: 38px; border-radius: 50%; color: var(--bg); font-size: 10px; cursor: pointer; display: none; align-items: center; justify-content: center; font-weight: 900; }

        .section-label { padding: 40px 20px 10px; font-size: 10px; letter-spacing: 3px; opacity: 0.3; font-weight: 900; text-transform: uppercase; text-align: center; }
        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; padding: 15px; }
        .card { background: var(--glass); border-radius: 15px; overflow: hidden; position: relative; border: 1px solid var(--border); }
        .card img { width: 100%; display: block; }
        .card-overlay { position: absolute; inset: 0; background: linear-gradient(transparent, rgba(0,0,0,0.8)); display: flex; align-items: flex-end; justify-content: space-around; padding: 15px; opacity: 0; transition: 0.3s; }
        .card:hover .card-overlay { opacity: 1; }
        .btn-action { background: rgba(255,255,255,0.2); border: 1px solid rgba(255,255,255,0.3); color: #fff; padding: 8px 12px; border-radius: 8px; font-size: 9px; font-weight: 800; cursor: pointer; text-transform: uppercase; }

        #modal { position: fixed; inset: 0; background: rgba(0,0,0,0.9); backdrop-filter: blur(30px); z-index: 7000; display: none; align-items: center; justify-content: center; overflow-y: auto; }
        .modal-inner { background: #111; width: 90%; max-width: 420px; border-radius: 35px; padding: 35px; border: 1px solid var(--border); }
        .input-item { width: 100%; padding: 15px; border-radius: 12px; border: 1px solid var(--border); background: #000; color: #fff; margin-bottom: 15px; font-size: 12px; font-weight: 700; text-transform: uppercase; }
        
        .dots { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; margin: 25px 0; justify-items: center; }
        .dot { width: 35px; height: 35px; border-radius: 50%; cursor: pointer; border: 2px solid rgba(255,255,255,0.2); }
    </style>
</head>
<body id="main-body">

    <audio id="audio-player"></audio>

    <div id="login-screen">
        <h1 class="logo-title" style="color: #fff; font-size: 80px; font-weight: 900; letter-spacing: -6px;">DEKOV</h1>
        <button class="google-btn" style="background: #fff; color: #000; border: none; padding: 18px 50px; border-radius: 40px; font-weight: 900; cursor: pointer; text-transform: uppercase;" onclick="login()">Enter</button>
    </div>

    <div id="app-content">
        <div class="header">
            <button class="btn-icon" onclick="toggleSidebar()">☰</button>
            <button class="btn-icon" onclick="copyApp()">🔗</button>
        </div>

        <nav id="sidebar">
            <button class="nav-btn" onclick="view('perfil')">My Studio</button>
            <button class="nav-btn" onclick="view('feed')">Discover Feed</button>
            <button class="nav-btn" onclick="toggleModal()">Settings</button>
            <button class="nav-btn" style="background:var(--accent); color:var(--bg);" onclick="document.getElementById('up-img').click()">Add Content</button>
            <input type="file" id="up-img" hidden onchange="upload(event)">
            <button class="nav-btn" style="margin-top:auto; opacity:0.2;" onclick="logout()">Exit</button>
        </nav>

        <div id="v-perfil">
            <div class="hero"><img src="https://picsum.photos/seed/dkv1/1200/600" id="v-banner"></div>
            <div class="profile-wrap">
                <div class="avatar" id="v-avatar-box"></div>
                <h1 id="v-name" class="user-name-main">...</h1>
                <div class="player">
                    <div class="player-top">
                        <img id="music-cover-img" src="">
                        <img id="spotify-logo" src="https://upload.wikimedia.org/wikipedia/commons/1/19/Spotify_logo_without_text.svg">
                        <div class="p-info"><span class="p-name" id="m-t">Silent Mode</span><span class="p-sub" id="m-a">No track active</span></div>
                        <button class="play-btn" id="play-pause" onclick="togglePlay()">PLAY</button>
                    </div>
                </div>
            </div>
            <div class="grid" id="my-grid"></div>
        </div>

        <div id="v-feed" style="display:none;">
            <div class="search-container">
                <input type="text" class="search-bar" id="feed-search" placeholder="Search Studio Gallery..." onkeydown="if(event.key==='Enter') genFeed()">
            </div>
            <div class="grid" id="global-grid"></div>
        </div>

        <div id="modal">
            <div class="modal-inner">
                <input type="text" id="in-name" class="input-item" placeholder="Name">
                <input type="text" id="in-gif" class="input-item" placeholder="GIF Wallpaper Link">
                <div class="dots">
                    <div class="dot" style="background:#000" onclick="setT('')"></div>
                    <div class="dot" style="background:#fff" onclick="setT('blanco')"></div>
                    <div class="dot" style="background:#007aff" onclick="setT('azul')"></div>
                    <div class="dot" style="background:#ff3b30" onclick="setT('rojo')"></div>
                    <div class="dot" style="background:#ff2d55" onclick="setT('rosa')"></div>
                    <div class="dot" style="background:#af52de" onclick="setT('purpura')"></div>
                    <div class="dot" style="background:#051405" onclick="setT('verde')"></div>
                    <div class="dot" style="background:#444" onclick="setT('gris')"></div>
                </div>
                <button class="nav-btn" onclick="save()">Apply & Save</button>
                <button class="nav-btn" onclick="toggleModal()">Close</button>
            </div>
        </div>
    </div>

    <script>
        const config = { apiKey: "AIzaSyCxRzw9Br2t4TGDfKsdTzAuVPyoi2ey-0o", authDomain: "dekov-c0c5b.firebaseapp.com", projectId: "dekov-c0c5b", storageBucket: "dekov-c0c5b.firebasestorage.app", messagingSenderId: "654392697937", appId: "1:654392697937:web:8b3b71eb94410709bc0470" };
        firebase.initializeApp(config);
        const auth = firebase.auth();

        // PERSISTENCIA: Cargar al iniciar
        window.onload = () => {
            if(localStorage.getItem('studioName')) document.getElementById('v-name').innerText = localStorage.getItem('studioName');
            if(localStorage.getItem('studioGif')) setGif(localStorage.getItem('studioGif'));
            if(localStorage.getItem('studioTheme')) setT(localStorage.getItem('studioTheme'));
        }

        function login() { auth.signInWithPopup(new firebase.auth.GoogleAuthProvider()).then(res => start(res.user)); }
        function logout() { localStorage.clear(); location.reload(); }

        function start(user) {
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('app-content').style.display = 'block';
            setTimeout(() => document.getElementById('app-content').style.opacity = '1', 50);
            if(!localStorage.getItem('studioName')) document.getElementById('v-name').innerText = user.displayName.toUpperCase();
            document.getElementById('v-avatar-box').innerHTML = `<img src="${user.photoURL}">`;
            genFeed();
        }

        function save() {
            const name = document.getElementById('in-name').value;
            const gif = document.getElementById('in-gif').value;
            if(name) { document.getElementById('v-name').innerText = name.toUpperCase(); localStorage.setItem('studioName', name.toUpperCase()); }
            if(gif) { setGif(gif); localStorage.setItem('studioGif', gif); }
            toggleModal();
        }

        function setGif(u) { if(u) document.body.style.backgroundImage = `url('${u}')`; }
        function setT(t) { document.getElementById('main-body').className = t ? 'tema-'+t : ''; localStorage.setItem('studioTheme', t); }
        function toggleSidebar() { document.getElementById('sidebar').classList.toggle('active'); }
        function toggleModal() { const m = document.getElementById('modal'); m.style.display = (m.style.display === 'flex') ? 'none' : 'flex'; }
        function view(v) { document.getElementById('v-perfil').style.display = v === 'perfil' ? 'block' : 'none'; document.getElementById('v-feed').style.display = v === 'feed' ? 'block' : 'none'; toggleSidebar(); }
        
        function genFeed() {
            const g = document.getElementById('global-grid');
            const term = document.getElementById('feed-search').value || 'studio';
            g.innerHTML = '';
            for(let i=0; i<16; i++) {
                const url = `https://picsum.photos/seed/${term + i + Math.random()}/800/1000`;
                g.innerHTML += `<div class="card"><img src="${url}"><div class="card-overlay"><button class="btn-action" onclick="down('${url}')">SAVE</button></div></div>`;
            }
        }
        function down(url) { const a = document.createElement('a'); a.href = url; a.download = 'dekov_hd.jpg'; a.click(); }
        function copyApp() { navigator.clipboard.writeText(window.location.href); alert("LINK COPIED"); }
        function upload(e) {
            const url = URL.createObjectURL(e.target.files[0]);
            document.getElementById('my-grid').innerHTML = `<div class="card"><img src="${url}"></div>` + document.getElementById('my-grid').innerHTML;
            toggleSidebar();
        }

        auth.onAuthStateChanged(u => { if(u) start(u); });
    </script>
</body>
</html>
