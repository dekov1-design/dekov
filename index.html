<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DEKOV | STUDIO PRO</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        :root {
            --bg: #000; --text: #fff; --accent: #007aff;
            --glass: rgba(255, 255, 255, 0.1); --border: rgba(255, 255, 255, 0.15);
            --card: rgba(28, 28, 30, 0.8);
        }
        .tema-purpura { --bg: #0f051a; --accent: #af52de; }
        .tema-verde { --bg: #05140b; --accent: #34c759; }

        body { background: var(--bg); color: var(--text); font-family: -apple-system, sans-serif; transition: 0.5s; overflow-x: hidden; }

        /* LOGIN SCREEN */
        #login-screen { position: fixed; inset: 0; background: #000; z-index: 9999; display: flex; align-items: center; justify-content: center; flex-direction: column; }
        .logo-main { font-size: 60px; font-weight: 900; letter-spacing: -4px; margin-bottom: 20px; }
        .google-btn { background: #fff; color: #000; border: none; padding: 16px 40px; border-radius: 40px; font-weight: bold; cursor: pointer; font-size: 16px; }

        /* UI APP */
        #app { display: none; opacity: 0; transition: 1s; }
        .btn-menu { position: fixed; top: 25px; left: 25px; z-index: 5100; width: 45px; height: 45px; border-radius: 50%; border: 1px solid var(--border); background: var(--glass); color: #fff; cursor: pointer; backdrop-filter: blur(10px); }

        /* SIDEBAR */
        #sidebar { position: fixed; top: 0; left: -280px; width: 280px; height: 100%; background: var(--card); backdrop-filter: blur(30px); z-index: 5000; transition: 0.4s; padding: 80px 25px; border-right: 1px solid var(--border); display: flex; flex-direction: column; }
        #sidebar.activo { left: 0; }
        .nav-item { width: 100%; padding: 15px; margin-bottom: 10px; border: none; border-radius: 14px; background: var(--glass); color: #fff; font-weight: 600; text-align: left; cursor: pointer; font-size: 14px; }

        /* PERFIL */
        #banner { height: 280px; background: #111; overflow: hidden; border-bottom: 1px solid var(--border); position: relative; }
        #banner img { width: 100%; height: 100%; object-fit: cover; }
        .perfil-header { text-align: center; margin-top: -70px; position: relative; z-index: 10; padding: 0 20px; }
        .avatar-wrap { width: 140px; height: 140px; border-radius: 50%; border: 5px solid var(--bg); display: inline-block; background: #222; overflow: hidden; box-shadow: 0 15px 40px rgba(0,0,0,0.6); }
        .avatar-wrap img { width: 100%; height: 100%; object-fit: cover; }

        /* MUSIC WIDGET */
        #music-box { background: #121212; border-radius: 16px; padding: 12px 20px; width: 100%; max-width: 300px; margin: 25px auto; display: flex; align-items: center; gap: 15px; border: 1px solid #1DB954; box-shadow: 0 8px 20px rgba(0,0,0,0.4); }
        .track-info { text-align: left; overflow: hidden; }
        .t-name { color: #1DB954; font-size: 14px; font-weight: 700; display: block; white-space: nowrap; text-overflow: ellipsis; overflow: hidden; }
        .t-art { font-size: 11px; opacity: 0.5; display: block; }

        /* GRID MURO */
        .muro { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; padding: 10px; margin-top: 10px; }
        .muro-item { aspect-ratio: 1; border-radius: 6px; overflow: hidden; background: #111; border: 1px solid var(--border); }
        .muro-item img { width: 100%; height: 100%; object-fit: cover; }

        /* MODAL CONFIG */
        #modal { position: fixed; inset: 0; background: rgba(0,0,0,0.92); backdrop-filter: blur(20px); display: none; align-items: center; justify-content: center; z-index: 10000; }
        .modal-box { background: var(--card); padding: 30px; border-radius: 35px; width: 90%; max-width: 380px; border: 1px solid var(--border); }
        .modal-box h2 { margin-bottom: 20px; font-size: 20px; text-align: center; }
        .input-text { width: 100%; padding: 14px; border-radius: 12px; border: 1px solid var(--border); background: rgba(0,0,0,0.3); color: #fff; margin-bottom: 15px; font-size: 14px; }
        
        .color-row { display: flex; gap: 15px; justify-content: center; margin: 20px 0; }
        .dot { width: 35px; height: 35px; border-radius: 50%; cursor: pointer; border: 2px solid transparent; transition: 0.3s; }
        .dot:hover { transform: scale(1.1); border-color: #fff; }
    </style>
</head>
<body id="main-body">

    <div id="login-screen">
        <h1 class="logo-main">DEKOV</h1>
        <button class="google-btn" onclick="login()">Sign in with Google</button>
    </div>

    <div id="app">
        <button class="btn-menu" onclick="toggleSide()">☰</button>

        <nav id="sidebar">
            <p style="font-size: 10px; opacity: 0.4; letter-spacing: 2px; margin-bottom: 25px;">STUDIO CONTROL</p>
            <button class="nav-item" onclick="toggleMod()">Editar Perfil</button>
            <button class="nav-item" onclick="document.getElementById('up-muro').click()">Añadir al Muro</button>
            <input type="file" id="up-muro" hidden onchange="addMuro(event)">
            <button class="nav-item" style="margin-top: auto; color: #ff3b30;" onclick="location.reload()">Log Out</button>
        </nav>

        <div id="modal">
            <div class="modal-box">
                <h2>Ajustes de Perfil</h2>
                
                <input type="text" id="set-name" class="input-text" placeholder="Nuevo nombre de usuario...">
                
                <button class="nav-item" onclick="document.getElementById('up-av').click()">Cambiar Avatar</button>
                <input type="file" id="up-av" hidden onchange="prev(event, 'u-av-img')">

                <button class="nav-item" onclick="document.getElementById('up-ban').click()">Cambiar Portada</button>
                <input type="file" id="up-ban" hidden onchange="prev(event, 'u-ban-img')">

                <div style="height: 1px; background: var(--border); margin: 15px 0;"></div>

                <button class="nav-item" style="background: #1DB954; color: #000;" onclick="linkSpoty()">Vincular Spotify</button>
                <button class="nav-item" onclick="document.getElementById('up-mus').click()">Subir Audio Local</button>
                <input type="file" id="up-mus" hidden accept="audio/*" onchange="setMus(event)">

                <div class="color-row">
                    <div class="dot" style="background:#111" onclick="setTema('')"></div>
                    <div class="dot" style="background:#af52de" onclick="setTema('purpura')"></div>
                    <div class="dot" style="background:#34c759" onclick="setTema('verde')"></div>
                </div>

                <button class="nav-item" style="background:var(--accent); text-align:center; margin-top:10px;" onclick="saveAll()">Guardar Cambios</button>
            </div>
        </div>

        <div id="banner"><img src="https://picsum.photos/seed/dk1/1200/500" id="u-ban-img"></div>
        
        <div class="perfil-header">
            <div class="avatar-wrap" id="u-av-img"></div>
            <h1 id="u-display-name" style="margin-top: 15px; font-weight: 900; letter-spacing: -1px;">...</h1>
            
            <div id="music-box">
                <img src="https://upload.wikimedia.org/wikipedia/commons/1/19/Spotify_logo_without_text.svg" width="24">
                <div class="track-info">
                    <span class="t-name" id="m-t">Sin reproducción</span>
                    <span class="t-art" id="m-a">Conecta tu música</span>
                </div>
            </div>
        </div>

        <div class="muro" id="m-grid">
            <div class="muro-item"><img src="https://picsum.photos/seed/p1/400"></div>
            <div class="muro-item"><img src="https://picsum.photos/seed/p2/400"></div>
            <div class="muro-item"><img src="https://picsum.photos/seed/p3/400"></div>
            <div class="muro-item"><img src="https://picsum.photos/seed/p4/400"></div>
            <div class="muro-item"><img src="https://picsum.photos/seed/p5/400"></div>
            <div class="muro-item"><img src="https://picsum.photos/seed/p6/400"></div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCxRzw9Br2t4TGDfKsdTzAuVPyoi2ey-0o",
            authDomain: "dekov-c0c5b.firebaseapp.com",
            projectId: "dekov-c0c5b",
            storageBucket: "dekov-c0c5b.firebasestorage.app",
            messagingSenderId: "654392697937",
            appId: "1:654392697937:web:8b3b71eb94410709bc0470"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();

        function login() {
            auth.signInWithPopup(new firebase.auth.GoogleAuthProvider()).then(res => start(res.user));
        }

        function start(user) {
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('app').style.display = 'block';
            setTimeout(() => document.getElementById('app').style.opacity = '1', 50);
            
            document.getElementById('u-display-name').innerText = user.displayName.toUpperCase();
            document.getElementById('u-av-img').innerHTML = `<img src="${user.photoURL}">`;
        }

        function toggleSide() { document.getElementById('sidebar').classList.toggle('activo'); }
        function toggleMod() { 
            const m = document.getElementById('modal');
            m.style.display = (m.style.display === 'flex') ? 'none' : 'flex';
        }

        function saveAll() {
            const name = document.getElementById('set-name').value;
            if(name) document.getElementById('u-display-name').innerText = name.toUpperCase();
            toggleMod();
        }

        function prev(e, id) {
            const url = URL.createObjectURL(e.target.files[0]);
            document.getElementById(id).innerHTML = `<img src="${url}">`;
        }

        function setMus(e) {
            const f = e.target.files[0];
            if(f) {
                document.getElementById('m-t').innerText = f.name.replace('.mp3', '');
                document.getElementById('m-a').innerText = "Biblioteca del dispositivo";
            }
        }

        function linkSpoty() {
            const l = prompt("URL de Spotify:");
            if(l) {
                document.getElementById('m-t').innerText = "Spotify Linked";
                document.getElementById('m-a').innerText = "Playlist Activa";
            }
        }

        function addMuro(e) {
            const url = URL.createObjectURL(e.target.files[0]);
            const item = `<div class="muro-item"><img src="${url}"></div>`;
            document.getElementById('m-grid').innerHTML = item + document.getElementById('m-grid').innerHTML;
            toggleSide();
        }

        function setTema(t) {
            document.getElementById('main-body').className = t ? 'tema-'+t : '';
        }

        auth.onAuthStateChanged(u => { if(u) start(u); });
    </script>
</body>
</html>
