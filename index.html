<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DEKOV | STUDIO PRO</title>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
--bg:#000;
--text:#fff;
--accent:#fff;
--glass:rgba(255,255,255,0.05);
--border:rgba(255,255,255,0.1);
--card:rgba(20,20,20,0.9);
}

.tema-blanco{--bg:#f5f5f7;--text:#000;--accent:#007aff;--glass:rgba(0,0,0,0.05);--border:rgba(0,0,0,0.1)}
.tema-violeta{--bg:#0f051a;--accent:#af52de}
.tema-verde{--bg:#051405;--accent:#34c759}
.tema-rosa{--bg:#1a000d;--accent:#ff2d55}
.tema-rojo{--bg:#1a0000;--accent:#ff3b30}

body{
background:var(--bg);
color:var(--text);
font-family:-apple-system, sans-serif;
transition:.4s;
overflow-x:hidden;
}

.header{
position:fixed;
top:0;
width:100%;
height:60px;
display:flex;
justify-content:space-between;
align-items:center;
padding:0 20px;
backdrop-filter:blur(20px);
z-index:5000;
}

.btn-icon{
width:40px;
height:40px;
border-radius:50%;
border:1px solid var(--border);
background:var(--glass);
color:var(--text);
cursor:pointer;
}

#sidebar{
position:fixed;
left:-260px;
top:0;
width:250px;
height:100%;
background:var(--card);
padding:80px 20px;
transition:.3s;
z-index:6000;
border-right:1px solid var(--border);
}

#sidebar.active{left:0}

.nav-btn{
width:100%;
padding:12px;
margin-bottom:10px;
border:none;
border-radius:12px;
background:var(--glass);
color:var(--text);
font-weight:700;
cursor:pointer;
}

.hero{
height:300px;
overflow:hidden;
background:#111;
}

.hero img{
width:100%;
height:100%;
object-fit:cover;
filter:contrast(1.1);
}

.profile-wrap{
text-align:center;
margin-top:-70px;
}

.avatar{
width:140px;
height:140px;
border-radius:50%;
border:5px solid var(--bg);
overflow:hidden;
margin:auto;
background:#222;
}

.avatar img{
width:100%;
height:100%;
object-fit:cover;
}

.user-name-main{
font-size:32px;
font-weight:900;
margin-top:15px;
}

.upload-btn{
margin-top:20px;
background:var(--accent);
color:var(--bg);
border:none;
padding:10px 25px;
border-radius:30px;
font-weight:800;
cursor:pointer;
}

.section-label{
text-align:center;
margin:30px 0 10px;
font-size:11px;
letter-spacing:3px;
opacity:.5;
}

.grid{
column-count:2;
column-gap:12px;
padding:15px;
}

.card{
break-inside:avoid;
margin-bottom:12px;
border-radius:20px;
overflow:hidden;
position:relative;
cursor:pointer;
}

.card img{
width:100%;
display:block;
border-radius:20px;
transition:.3s;
}

.card:hover img{
transform:scale(1.05);
filter:brightness(.8);
}

.card::after{
content:"SAVE";
position:absolute;
bottom:15px;
right:15px;
background:var(--accent);
color:var(--bg);
padding:6px 12px;
border-radius:20px;
font-size:10px;
opacity:0;
transition:.3s;
}

.card:hover::after{opacity:1}

.theme-btn{
width:35px;
height:35px;
border-radius:50%;
border:1px solid var(--border);
background:var(--glass);
cursor:pointer;
}

#login-screen{
position:fixed;
inset:0;
background:#000;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
z-index:10000;
}

#app-content{display:none;padding-top:60px}
</style>
</head>

<body>

<audio id="audio-player"></audio>

<div id="login-screen">
<h1 style="font-size:60px;font-weight:900;margin-bottom:20px;">DEKOV</h1>
<button onclick="login()" style="padding:15px 40px;border:none;border-radius:30px;font-weight:800;">Login with Google</button>
</div>

<div id="app-content">

<div class="header">
<button class="btn-icon" onclick="toggleSidebar()">☰</button>
<button class="btn-icon" onclick="toggleModal()">⚙</button>
</div>

<nav id="sidebar">
<button class="nav-btn" onclick="view('perfil')">My Studio</button>
<button class="nav-btn" onclick="view('feed')">Discover</button>
<button class="nav-btn" onclick="logout()">Sign Out</button>
</nav>

<div id="v-perfil">
<div class="hero"><img id="v-banner" src="https://picsum.photos/1200/600"></div>
<div class="profile-wrap">
<div class="avatar" id="v-avatar-box"></div>
<h1 id="v-name" class="user-name-main">...</h1>
<button class="upload-btn" onclick="document.getElementById('up-img').click()">+ Upload to Wall</button>
<input type="file" id="up-img" hidden accept="image/*" onchange="upload(event)">
</div>

<p class="section-label">Gallery</p>
<div class="grid" id="my-grid"></div>
</div>

<div id="v-feed" style="display:none;">
<p class="section-label">Discover</p>
<div class="grid" id="global-grid"></div>
</div>

<div id="modal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.9);justify-content:center;align-items:center;">
<div style="background:#111;padding:25px;border-radius:20px;width:90%;max-width:350px;">

<input id="in-name" placeholder="Custom Name" style="width:100%;padding:10px;margin-bottom:10px">

<button class="nav-btn" onclick="document.getElementById('f-avatar').click()">Change Avatar</button>
<input type="file" id="f-avatar" hidden accept="image/*" onchange="setAvatar(event)">

<button class="nav-btn" onclick="document.getElementById('f-banner').click()">Change Banner</button>
<input type="file" id="f-banner" hidden accept="image/*" onchange="setBanner(event)">

<p style="margin:15px 0 5px;font-size:12px;">Theme</p>

<div style="display:flex;gap:10px;flex-wrap:wrap;">
<button onclick="setTheme('')" class="theme-btn">⚫</button>
<button onclick="setTheme('tema-blanco')" class="theme-btn">⚪</button>
<button onclick="setTheme('tema-violeta')" class="theme-btn">🟣</button>
<button onclick="setTheme('tema-verde')" class="theme-btn">🟢</button>
<button onclick="setTheme('tema-rosa')" class="theme-btn">🌸</button>
<button onclick="setTheme('tema-rojo')" class="theme-btn">🔴</button>
</div>

<button class="nav-btn" style="margin-top:15px;background:var(--accent);color:var(--bg);" onclick="applySettings()">Apply</button>
<button class="nav-btn" onclick="toggleModal()">Close</button>

</div>
</div>

</div>

<script>
const firebaseConfig={
apiKey:"TU_API_KEY",
authDomain:"TU_AUTH_DOMAIN",
projectId:"TU_PROJECT_ID",
appId:"TU_APP_ID"
};

firebase.initializeApp(firebaseConfig);
const auth=firebase.auth();

function login(){auth.signInWithPopup(new firebase.auth.GoogleAuthProvider());}
function logout(){auth.signOut().then(()=>location.reload());}

auth.onAuthStateChanged(user=>{
if(user){
document.getElementById('login-screen').style.display='none';
document.getElementById('app-content').style.display='block';
document.getElementById('v-name').innerText=user.displayName.toUpperCase();
document.getElementById('v-avatar-box').innerHTML=`<img src="${user.photoURL}">`;
genFeed();
}
});

function toggleSidebar(){document.getElementById('sidebar').classList.toggle('active')}
function toggleModal(){
const m=document.getElementById('modal');
m.style.display=m.style.display==='flex'?'none':'flex';
}

function view(v){
document.getElementById('v-perfil').style.display=v==='perfil'?'block':'none';
document.getElementById('v-feed').style.display=v==='feed'?'block':'none';
toggleSidebar();
}

function upload(e){
const url=URL.createObjectURL(e.target.files[0]);
document.getElementById('my-grid').innerHTML=`<div class="card"><img src="${url}"></div>`+document.getElementById('my-grid').innerHTML;
}

function genFeed(){
const g=document.getElementById('global-grid');
g.innerHTML='';
for(let i=0;i<12;i++){
g.innerHTML+=`<div class="card"><img src="https://picsum.photos/seed/art${i}/800/1000"></div>`;
}
}

function setAvatar(e){
const url=URL.createObjectURL(e.target.files[0]);
document.getElementById('v-avatar-box').innerHTML=`<img src="${url}">`;
}

function setBanner(e){
const url=URL.createObjectURL(e.target.files[0]);
document.getElementById('v-banner').src=url;
}

function setTheme(t){
document.body.className='';
if(t)document.body.classList.add(t);
localStorage.setItem('theme',t);
}

function applySettings(){
const n=document.getElementById('in-name').value;
if(n){
document.getElementById('v-name').innerText=n.toUpperCase();
localStorage.setItem('name',n);
}
toggleModal();
}

window.onload=()=>{
const t=localStorage.getItem('theme');
if(t)document.body.classList.add(t);
const n=localStorage.getItem('name');
if(n)document.getElementById('v-name').innerText=n.toUpperCase();
}
</script>

</body>
</html>
