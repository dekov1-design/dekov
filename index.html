<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DEKOV | STUDIO PRO</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        :root {
            --bg: #000; --text: #fff; --accent: #007aff;
            --glass: rgba(255, 255, 255, 0.05); --border: rgba(255, 255, 255, 0.1);
            --card: rgba(15, 15, 15, 0.9);
        }
        
        body { 
            background: var(--bg); 
            background-size: cover; background-position: center; background-attachment: fixed;
            color: var(--text); font-family: -apple-system, sans-serif; transition: 0.5s; overflow-x: hidden;
        }

        /* LOGIN */
        #login-screen { position: fixed; inset: 0; background: #000; z-index: 10000; display: flex; align-items: center; justify-content: center; flex-direction: column; }
        .logo-title { font-size: 80px; font-weight: 900; letter-spacing: -6px; margin-bottom: 30px; }
        .google-btn { background: #fff; color: #000; border: none; padding: 18px 50px; border-radius: 40px; font-weight: 900; cursor: pointer; font-size: 14px; text-transform: uppercase; }

        /* HEADER LIMPIO (SIN NOMBRE) */
        .header { position: fixed; top: 0; width: 100%; height: 60px; z-index: 5000; display: flex; align-items: center; justify-content: space-between; padding: 0 20px; backdrop-filter: blur(20px); }
        .btn-icon { width: 40px; height: 40px; border-radius: 50%; border: 1px solid var(--border); background: var(--glass); color: #fff; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 20px; }

        /* SIDEBAR */
        #sidebar { 
            position: fixed; top: 0; left: -300px; width: 280px; height: 100%; 
            background: var(--card); backdrop-filter: blur(40px); z-index: 6000; 
            transition: 0.4s; padding: 80px 20px; border-right: 1px solid var(--border);
        }
        #sidebar.active { left: 0; }
        .nav-btn { width: 100%; padding: 15px; margin-bottom: 10px; border: none; border-radius: 12px; background: var(--glass); color: #fff; font-weight: 700; text-align: left; cursor: pointer; font-size: 11px; text-transform: uppercase; letter-spacing: 1px; }

        /* CONTENT */
        #app-content { display: none; padding-top: 20px; opacity: 0; transition: 0.8s; }
        .hero { height: 380px; background: #111; overflow: hidden; position: relative; }
        .hero img { width: 100%; height: 100%; object-fit: cover; }
        
        .profile-wrap { text-align: center; margin-top: -85px; position: relative; z-index: 10; padding: 0 20px; }
        .avatar { width: 155px; height: 155px; border-radius: 50%; border: 6px solid var(--bg); display: inline-block; background: #222; overflow: hidden; box-shadow: 0 20px 40px rgba(0,0,0,0.8); }
        .avatar img { width: 100%; height: 100%; object-fit: cover; }
        .user-name-main { font-size: 42px; font-weight: 900; letter-spacing: -2px; margin-top: 15px; text-transform: uppercase; }

        /* PLAYER WIDGET MEJORADO */
        .player { background: rgba(10,10,10,0.6); backdrop-filter: blur(10px); border-radius: 20px; padding: 15px; width: 100%; max-width: 330px; margin: 30px auto; display: flex; flex-direction: column; gap: 12px; border: 1px solid var(--border); }
        .player-top { display: flex; align-items: center; gap: 15px; }
        
        #music-cover-img { width: 50px; height: 50px; border-radius: 8px; object-fit: cover; display: none; border: 1px solid var(--border); }
        #spotify-logo { width: 22px; display: none; }

        .p-info { text-align: left; flex-grow: 1; overflow: hidden; }
        .p-name { color: #fff; font-size: 13px; font-weight: 800; display: block; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; text-transform: uppercase; }
        .p-sub { font-size: 9px; opacity: 0.4; text-transform: uppercase; letter-spacing: 1px; }
        
        .play-btn { background: #fff; border: none; width: 38px; height: 38px; border-radius: 50%; color: #000; font-size: 10px; cursor: pointer; display: none; align-items: center; justify-content: center; font-weight: 900; }
        
        /* GRID */
        .section-label { padding: 40px 20px 10px; font-size: 10px; letter-spacing: 3px; opacity: 0.3; font-weight: 900; text-transform: uppercase; text-align: center; }
        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; padding: 15px; }
        .card { background: #111; border-radius: 15px; overflow: hidden; position: relative; border: 1px solid var(--border); }
        .card img { width: 100%; display: block; }
        .card-overlay { position: absolute; inset: 0; background: linear-gradient(transparent, rgba(0,0,0,0.9)); display: flex; align-items: flex-end; justify-content: space-around; padding: 15px; opacity: 0; transition: 0.3s; }
        .card:hover .card-overlay { opacity: 1; }
        .btn-action { background: var(--glass); border: 1px solid var(--border); color: #fff; padding: 8px 12px; border-radius: 8px; font-size: 9px; font-weight: 800; cursor: pointer; text-transform: uppercase; }

        /* MODAL */
        #modal { position: fixed; inset: 0; background: rgba(0,0,0,0.95); backdrop-filter: blur(30px); z-index: 7000; display: none; align-items: center; justify-content: center; overflow-y: auto; }
        .modal-inner { background: #111; width: 90%; max-width: 420px; border-radius: 35px; padding: 35px; border: 1px solid var(--border); margin: 40px 0; }
        .input-item { width: 100%; padding: 15px; border-radius: 12px; border: 1px solid var(--border); background: #000; color: #fff; margin-bottom: 15px; font-size: 12px; font-weight: 700; text-transform: uppercase; }
        
        .dots { display: flex; gap: 15px; justify-content: center; margin: 20px 0; }
        .dot { width: 32px; height: 32px; border-radius: 50%; cursor: pointer; border: 2px solid transparent; }
    </style>
</head>
<body id="main">

    <audio id="audio-player"></audio>

    <div id="login-screen">
        <h1 class="logo-title">DEKOV</h1>
        <button class="google-btn" onclick="login()">Enter</button>
    </div>

    <div id="app-content">
        <div class="header">
            <button class="btn-icon" onclick="toggleSidebar()">☰</button>
            <button class="btn-icon" onclick="copyApp()">🔗</button>
        </div>

        <nav id="sidebar">
            <button class="nav-btn" onclick="view('perfil')">My Studio</button>
            <button class="nav-btn" onclick="view('feed')">Discover</button>
            <button class="nav-btn" onclick="toggleModal()">Edit Profile</button>
            <button class="nav-btn" style="background:var(--accent);" onclick="document.getElementById('up-img').click()">Add Content</button>
            <input type="file" id="up-img" hidden onchange="upload(event)">
            <button class="nav-btn" style="margin-top:auto; opacity:0.2;" onclick="location.reload()">Exit</button>
        </nav>

        <div id="v-perfil">
            <div class="hero"><img src="https://picsum.photos/seed/dkv1/1200/600" id="v-banner"></div>
            <div class="profile-wrap">
                <div class="avatar" id="v-avatar-box"></div>
                <h1 id="v-name" class="user-name-main">...</h1>
                
                <div class="player">
                    <div class="player-top">
                        <img id="music-cover-img" src="">
                        <img id="spotify-logo" src="https://upload.wikimedia.org/wikipedia/commons/1/19/Spotify_logo_without_text.svg">
                        <div class="p-info">
                            <span class="p-name" id="m-t">Silent Mode</span>
                            <span class="p-sub" id="m-a">No track active</span>
                        </div>
                        <button class="play-btn" id="play-pause" onclick="togglePlay()">PLAY</button>
                    </div>
                    <div id="progress-bar" style="height: 2px; background: rgba(255,255,255,0.1); border-radius: 1px; display:none;">
                        <div id="progress-fill" style="height: 100%; width: 0%; background: #fff; transition: 0.1s;"></div>
                    </div>
                </div>
            </div>
            <p class="section-label">Gallery Collection</p>
            <div class="grid" id="my-grid"></div>
        </div>

        <div id="v-feed" style="display:none;">
            <p class="section-label">Global Feed</p>
            <div class="grid" id="global-grid"></div>
        </div>

        <div id="modal">
            <div class="modal-inner">
                <h2 style="margin-bottom:25px; text-transform: uppercase; font-size: 14px; letter-spacing: 2px; opacity: 0.5;">Settings</h2>
                
                <input type="text" id="in-name" class="input-item" placeholder="Name">
                <input type="text" id="in-gif" class="input-item" placeholder="GIF Wallpaper Link" onchange="setGif(this.value)">
                
                <div class="dots">
                    <div class="dot" style="background:#111" onclick="setT('')"></div>
                    <div class="dot" style="background:#af52de" onclick="setT('purpura')"></div>
                    <div class="dot" style="background:#34c759" onclick="setT('verde')"></div>
                </div>

                <button class="nav-btn" onclick="document.getElementById('f-av').click()">Edit Avatar</button>
                <input type="file" id="f-av" hidden onchange="prev(event, 'v-avatar-box')">

                <button class="nav-btn" onclick="document.getElementById('f-ban').click()">Edit Cover</button>
                <input type="file" id="f-ban" hidden onchange="prev(event, 'v-banner')">

                <div style="height: 1px; background: var(--border); margin: 20px 0;"></div>

                <button class="nav-btn" style="background:#1DB954; color:#000;" onclick="linkS()">Spotify Sync</button>
                <button class="nav-btn" onclick="document.getElementById('f-mus').click()">Add MP3 File</button>
                <input type="file" id="f-mus" hidden accept="audio/*" onchange="setM(event)">

                <button class="nav-btn" onclick="document.getElementById('f-cover').click()">Add Music Artwork</button>
                <input type="file" id="f-cover" hidden onchange="setMusicCover(event)">

                <button class="nav-btn" style="background:var(--accent); text-align:center; margin-top:20px; color:#fff;" onclick="save()">Apply All</button>
            </div>
        </div>
    </div>

    <script>
        const config = {
            apiKey: "AIzaSyCxRzw9Br2t4TGDfKsdTzAuVPyoi2ey-0o",
            authDomain: "dekov-c0c5b.firebaseapp.com",
            projectId: "dekov-c0c5b",
            storageBucket: "dekov-c0c5b.firebasestorage.app",
            messagingSenderId: "654392697937",
            appId: "1:654392697937:web:8b3b71eb94410709bc0470"
        };

        firebase.initializeApp(config);
        const auth = firebase.auth();
        const audio = document.getElementById('audio-player');

        function login() {
            auth.signInWithPopup(new firebase.auth.GoogleAuthProvider()).then(res => start(res.user));
        }

        function start(user) {
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('app-content').style.display = 'block';
            setTimeout(() => document.getElementById('app-content').style.opacity = '1', 50);
            document.getElementById('v-name').innerText = user.displayName.toUpperCase();
            document.getElementById('v-avatar-box').innerHTML = `<img src="${user.photoURL}">`;
            genFeed();
        }

        function togglePlay() {
            if (audio.paused) { audio.play(); document.getElementById('play-pause').innerText = 'PAUSE'; } 
            else { audio.pause(); document.getElementById('play-pause').innerText = 'PLAY'; }
        }

        audio.ontimeupdate = () => {
            const pct = (audio.currentTime / audio.duration) * 100;
            document.getElementById('progress-fill').style.width = pct + '%';
        };

        function setM(e) { 
            const f = e.target.files[0]; 
            if(f) { 
                audio.src = URL.createObjectURL(f);
                document.getElementById('m-t').innerText = f.name.replace('.mp3','').toUpperCase(); 
                document.getElementById('m-a').innerText = "LOCAL TRACK";
                document.getElementById('play-pause').style.display = 'flex';
                document.getElementById('progress-bar').style.display = 'block';
                document.getElementById('spotify-logo').style.display = 'none';
                toggleModal();
            }
        }

        function setMusicCover(e) {
            const f = e.target.files[0];
            if(f) {
                const url = URL.createObjectURL(f);
                const img = document.getElementById('music-cover-img');
                img.src = url;
                img.style.display = 'block';
                toggleModal();
            }
        }

        function linkS() { 
            const l = prompt("Spotify URL:"); 
            if(l) { 
                document.getElementById('m-t').innerText = "SPOTIFY ACTIVE"; 
                document.getElementById('m-a').innerText = "STREAMING NOW"; 
                document.getElementById('spotify-logo').style.display = 'block';
                document.getElementById('play-pause').style.display = 'none';
                document.getElementById('progress-bar').style.display = 'none';
            }
        }

        function view(v) {
            document.getElementById('v-perfil').style.display = v === 'perfil' ? 'block' : 'none';
            document.getElementById('v-feed').style.display = v === 'feed' ? 'block' : 'none';
            toggleSidebar();
        }

        function genFeed() {
            const g = document.getElementById('global-grid'); g.innerHTML = '';
            for(let i=0; i<16; i++) {
                const id = Math.floor(Math.random()*1000);
                const url = `https://picsum.photos/id/${id}/800/1000`;
                g.innerHTML += `
                    <div class="card">
                        <img src="${url}">
                        <div class="card-overlay">
                            <button class="btn-action" onclick="this.innerText='LIKED'">LIKE</button>
                            <button class="btn-action" onclick="down('${url}')">SAVE</button>
                        </div>
                    </div>
                `;
            }
        }

        function down(url) {
            const a = document.createElement('a'); a.href = url; a.download = 'dekov_hd.jpg';
            document.body.appendChild(a); a.click(); document.body.removeChild(a);
        }

        function copyApp() { navigator.clipboard.writeText(window.location.href); alert("LINK COPIED"); }
        function upload(e) {
            const url = URL.createObjectURL(e.target.files[0]);
            document.getElementById('my-grid').innerHTML = `<div class="card"><img src="${url}"></div>` + document.getElementById('my-grid').innerHTML;
            toggleSidebar();
        }
        function setGif(u) { if(u) document.body.style.backgroundImage = `url('${u}')`; }
        function prev(e, id) {
            const url = URL.createObjectURL(e.target.files[0]);
            const t = document.getElementById(id);
            if(t.tagName === 'IMG') t.src = url; else t.innerHTML = `<img src="${url}">`;
        }
        function save() {
            const n = document.getElementById('in-name').value;
            if(n) document.getElementById('v-name').innerText = n.toUpperCase();
            toggleModal();
        }
        function toggleSidebar() { document.getElementById('sidebar').classList.toggle('active'); }
        function toggleModal() { 
            const m = document.getElementById('modal');
            m.style.display = (m.style.display === 'flex') ? 'none' : 'flex'; 
        }
        function setT(t) { document.body.className = t ? 'tema-'+t : ''; }
        auth.onAuthStateChanged(u => { if(u) start(u); });
    </script>
</body>
</html>
