<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DEKOV | STUDIO</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: #000; color: #fff; font-family: -apple-system, sans-serif; overflow-x: hidden; }
        
        /* LOGIN */
        #login-screen { position: fixed; inset: 0; background: #000; z-index: 9999; display: flex; align-items: center; justify-content: center; flex-direction: column; }
        .btn-g { background: #fff; color: #000; border: none; padding: 15px 30px; border-radius: 30px; font-weight: bold; cursor: pointer; margin-top: 20px; }

        /* HEADER */
        #banner { height: 220px; background: #111; overflow: hidden; }
        #banner img { width: 100%; height: 100%; object-fit: cover; }
        .perfil { text-align: center; margin-top: -50px; }
        .avatar { width: 110px; height: 110px; border-radius: 50%; border: 4px solid #000; display: inline-block; background: #222; overflow: hidden; }
        .avatar img { width: 100%; height: 100%; object-fit: cover; }

        /* MENU */
        #menu { position: fixed; top: 20px; left: 20px; z-index: 1000; background: rgba(255,255,255,0.1); border: none; color: #fff; padding: 10px; border-radius: 10px; }

        /* GRID */
        .muro { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; padding: 15px; }
        .foto { background: #111; aspect-ratio: 1; border-radius: 10px; overflow: hidden; border: 1px solid #222; }
        .foto img { width: 100%; height: 100%; object-fit: cover; }

        /* SPOTIFY */
        .spotify { background: #121212; border: 1px solid #1DB954; width: 250px; margin: 15px auto; border-radius: 10px; padding: 10px; display: flex; align-items: center; gap: 10px; }
    </style>
</head>
<body>

        <h1 style="font-size: 50px; letter-spacing: -3px;">DEKOV</h1>
        <button class="btn-g" onclick="entrar()">Entrar con Google</button>
    </div>
