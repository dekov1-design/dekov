<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DEKOV | STUDIO PRO</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-storage-compat.js"></script>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        :root {
            --bg: #000; --text: #fff; --accent: #007aff;
            --glass: rgba(255, 255, 255, 0.05); --border: rgba(255, 255, 255, 0.1);
            --card: rgba(15, 15, 15, 0.9);
        }

        body { background: var(--bg); color: var(--text); font-family: -apple-system, sans-serif; overflow-x: hidden; }
        
        /* CHAT UI */
        #v-chat { display: flex; flex-direction: column; height: calc(100vh - 60px); }
        #chat-messages { flex-grow: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        .msg { display: flex; gap: 10px; max-width: 85%; }
        .msg.me { align-self: flex-end; flex-direction: row-reverse; }
        .msg img { width: 30px; height: 30px; border-radius: 50%; }
        .msg-bubble { background: var(--glass); padding: 10px 15px; border-radius: 18px; border: 1px solid var(--border); font-size: 13px; }
        .msg.me .msg-bubble { background: var(--accent); color: #fff; border: none; }
        .chat-input-area { padding: 15px; background: var(--bg); border-top: 1px solid var(--border); display: flex; gap: 10px; }
        .chat-input { flex-grow: 1; background: var(--glass); border: 1px solid var(--border); border-radius: 25px; padding: 12px 20px; color: #fff; font-size: 14px; }
        
        /* HEADER & NAV (Se mantienen) */
        .header { position: fixed; top: 0; width: 100%; height: 60px; z-index: 5000; display: flex; align-items: center; justify-content: space-between; padding: 0 20px; backdrop-filter: blur(20px); border-bottom: 1px solid var(--border); background: rgba(0,0,0,0.5); }
        .btn-icon { width: 40px; height: 40px; border-radius: 50%; border: 1px solid var(--border); background: var(--glass); color: var(--text); cursor: pointer; display: flex; align-items: center; justify-content: center; }
        
        #sidebar { position: fixed; top: 0; left: -300px; width: 280px; height: 100%; background: var(--card); backdrop-filter: blur(40px); z-index: 6000; transition: 0.4s; padding: 80px 20px; }
        #sidebar.active { left: 0; }
        .nav-btn { width: 100%; padding: 15px; margin-bottom: 10px; border: none; border-radius: 12px; background: var(--glass); color: var(--text); font-weight: 700; text-align: left; cursor: pointer; text-transform: uppercase; font-size: 11px; }

        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; padding: 15px; }
        .card { background: var(--glass); border-radius: 15px; overflow: hidden; border: 1px solid var(--border); }
        .card img { width: 100%; display: block; }
    </style>
</head>
<body>

    <div id="login-screen" style="position:fixed; inset:0; background:#000; z-index:10000; display:flex; flex-direction:column; align-items:center; justify-content:center;">
        <h1 style="font-size:70px; font-weight:900; letter-spacing:-5px; margin-bottom:20px;">DEKOV</h1>
        <button onclick="login()" style="padding:15px 40px; border-radius:30px; border:none; font-weight:900; cursor:pointer;">GOOGLE LOGIN</button>
    </div>

    <div id="app-content" style="display:none; padding-top: 60px;">
        <div class="header">
            <button class="btn-icon" onclick="toggleSidebar()">☰</button>
            <div id="view-title" style="font-weight:900; letter-spacing:2px; font-size:12px;">FEED</div>
            <button class="btn-icon" onclick="location.reload()">🔄</button>
        </div>

        <nav id="sidebar">
            <button class="nav-btn" onclick="view('feed')">Explore Feed</button>
            <button class="nav-btn" onclick="view('chat')">Global Chat</button>
            <button class="nav-btn" onclick="view('perfil')">My Studio</button>
            <button class="nav-btn" style="background:var(--accent); color:#fff;" onclick="document.getElementById('f-up').click()">Upload Photo</button>
            <input type="file" id="f-up" hidden onchange="uploadPhoto(event)">
        </nav>

        <div id="v-feed" class="grid"></div>

        <div id="v-chat" style="display:none;">
            <div id="chat-messages"></div>
            <div class="chat-input-area">
                <input type="text" id="chat-input" class="chat-input" placeholder="Escribe un mensaje..." onkeydown="if(event.key==='Enter') sendMsg()">
                <button onclick="sendMsg()" style="background:var(--accent); border:none; width:45px; height:45px; border-radius:50%; color:#fff;">↑</button>
            </div>
        </div>

        <div id="v-perfil" style="display:none; text-align:center; padding:20px;">
            <div id="p-avatar" style="width:100px; height:100px; border-radius:50%; margin:0 auto; border:3px solid var(--accent); overflow:hidden;"></div>
            <h2 id="p-name" style="margin-top:15px; text-transform:uppercase;">...</h2>
            <div id="my-posts" class="grid"></div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCxRzw9Br2t4TGDfKsdTzAuVPyoi2ey-0o",
            authDomain: "dekov-c0c5b.firebaseapp.com",
            projectId: "dekov-c0c5b",
            storageBucket: "dekov-c0c5b.appspot.com",
            messagingSenderId: "654392697937",
            appId: "1:654392697937:web:8b3b71eb94410709bc0470"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();
        const storage = firebase.storage();
        let user = null;

        function login() {
            auth.signInWithPopup(new firebase.auth.GoogleAuthProvider()).then(res => {
                user = res.user;
                initApp();
            });
        }

        function initApp() {
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('app-content').style.display = 'block';
            document.getElementById('p-name').innerText = user.displayName;
            document.getElementById('p-avatar').innerHTML = `<img src="${user.photoURL}" style="width:100%">`;
            loadFeed();
            loadChat();
        }

        // --- LÓGICA DE FEED ---
        async function uploadPhoto(e) {
            const file = e.target.files[0];
            if(!file) return;
            const ref = storage.ref(`posts/${Date.now()}`);
            await ref.put(file);
            const url = await ref.getDownloadURL();
            await db.collection('posts').add({ url, uid: user.uid, name: user.displayName, time: Date.now() });
            loadFeed();
        }

        function loadFeed() {
            db.collection('posts').orderBy('time', 'desc').onSnapshot(snap => {
                const f = document.getElementById('v-feed');
                f.innerHTML = '';
                snap.forEach(doc => {
                    f.innerHTML += `<div class="card"><img src="${doc.data().url}"></div>`;
                });
            });
        }

        // --- LÓGICA DE CHAT ---
        function sendMsg() {
            const input = document.getElementById('chat-input');
            if(!input.value.trim()) return;
            db.collection('chat').add({
                text: input.value,
                name: user.displayName,
                photo: user.photoURL,
                uid: user.uid,
                time: Date.now()
            });
            input.value = '';
        }

        function loadChat() {
            db.collection('chat').orderBy('time', 'asc').onSnapshot(snap => {
                const box = document.getElementById('chat-messages');
                box.innerHTML = '';
                snap.forEach(doc => {
                    const m = doc.data();
                    const isMe = m.uid === user.uid ? 'me' : '';
                    box.innerHTML += `
                        <div class="msg ${isMe}">
                            <img src="${m.photo}">
                            <div class="msg-bubble">${m.text}</div>
                        </div>
                    `;
                });
                box.scrollTop = box.scrollHeight;
            });
        }

        function view(v) {
            ['v-feed', 'v-chat', 'v-perfil'].forEach(id => document.getElementById(id).style.display = 'none');
            document.getElementById('v-' + v).style.display = (v === 'chat') ? 'flex' : 'grid';
            document.getElementById('view-title').innerText = v.toUpperCase();
            toggleSidebar();
        }

        function toggleSidebar() { document.getElementById('sidebar').classList.toggle('active'); }
        auth.onAuthStateChanged(u => { if(u) { user = u; initApp(); } });
    </script>
</body>
</html>
